<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - QR Attendance</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    :root {
      --ink: #1a1f2e;
      --muted: #5a6778;
      --brand: #d97706;
    }
    body {
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 8% 10%, rgba(217, 119, 6, 0.16), transparent 70%),
        linear-gradient(135deg, #f5f8ff 0%, #eef3fb 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      border: 0;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 16px 40px rgba(14, 27, 42, 0.12);
      border-radius: 16px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
      border: 0;
      box-shadow: 0 10px 20px rgba(217, 119, 6, 0.28);
    }
    .note { color: var(--muted); font-size: 0.92rem; }
    .alert-inline {
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid rgba(14, 27, 42, 0.08);
      color: var(--muted);
      padding: 10px 12px;
      display: none;
    }
    .alert-inline.ok {
      background: rgba(15, 118, 110, 0.1);
      color: #0f766e;
      border-color: rgba(15, 118, 110, 0.2);
    }
    .alert-inline.err {
      background: rgba(220, 38, 38, 0.1);
      color: #b91c1c;
      border-color: rgba(220, 38, 38, 0.2);
    }
  </style>
</head>
<body>
  <div class="card p-4 p-md-5" style="max-width: 420px; width: 100%;">
    <h3 class="mb-1">Sign in</h3>
    <p class="note mb-4">Use your account to access admin pages.</p>

    <div id="alert" class="alert-inline mb-3"></div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" type="email" class="form-control" placeholder="you@company.com" />
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input id="password" type="password" class="form-control" placeholder="••••••••" />
    </div>

    <button id="loginBtn" type="button" class="btn btn-primary w-100">Login</button>
    <div class="note mt-3">After login, you can open `/admin`.</div>
  </div>

  <script src="/login.js" defer></script>
</body>
</html>
